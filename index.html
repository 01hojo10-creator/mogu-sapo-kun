<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>もぐサポ君</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3eee6;
      --surface: rgba(255, 251, 246, 0.92);
      --surface-strong: #fffdf9;
      --line: rgba(56, 43, 28, 0.12);
      --ink: #1e1914;
      --muted: #6c6256;
      --accent: #c96429;
      --accent-deep: #913e10;
      --accent-soft: rgba(201, 100, 41, 0.12);
      --success: #1f8b62;
      --success-soft: rgba(31, 139, 98, 0.12);
      --warning: #966816;
      --warning-soft: rgba(150, 104, 22, 0.12);
      --danger: #b33f3f;
      --danger-soft: rgba(179, 63, 63, 0.12);
      --shadow: 0 18px 46px rgba(90, 58, 27, 0.12);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Yu Gothic UI", "Meiryo", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(201, 100, 41, 0.15), transparent 28%),
        radial-gradient(circle at bottom right, rgba(31, 139, 98, 0.1), transparent 30%),
        linear-gradient(160deg, #f7f2ea 0%, #ece2d3 100%);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    h1,
    h2,
    h3,
    h4,
    p {
      margin-top: 0;
    }

    .app-shell {
      width: min(1380px, calc(100% - 20px));
      margin: 0 auto;
      padding: 18px 0 40px;
    }

    .hero,
    .panel {
      border-radius: var(--radius-xl);
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.58);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 6px;
      padding: 16px 24px 14px;
      margin-bottom: 18px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at top right, rgba(201, 100, 41, 0.06), transparent 24%),
        linear-gradient(180deg, rgba(255, 251, 246, 0.97), rgba(255, 249, 244, 0.92));
    }

    .hero-main {
      max-width: 620px;
      padding-right: 120px;
      display: grid;
      gap: 0;
    }

    .eyebrow,
    .section-kicker {
      margin: 0 0 8px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-size: 0.66rem;
      font-weight: 600;
      color: var(--accent-deep);
    }

    .hero-title {
      margin-bottom: 9px;
      font-size: clamp(1.55rem, 2.7vw, 2.45rem);
      line-height: 1.14;
      letter-spacing: -0.018em;
      font-family: "Hiragino Maru Gothic ProN", "Yu Gothic UI", "Meiryo", sans-serif;
      font-weight: 700;
      color: #6a564b;
      max-width: 520px;
    }

    .hero-copy {
      max-width: 540px;
      line-height: 1.76;
      font-size: 0.94rem;
      color: #6f6458;
      margin-bottom: 0;
    }

    .hero-sprig {
      position: absolute;
      right: 14px;
      bottom: 10px;
      width: 70px;
      opacity: 0.46;
      pointer-events: none;
    }

    .hero-sprig svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .muted,
    .status-line,
    .hint {
      color: var(--muted);
    }

    .page-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
      position: relative;
      z-index: 5;
    }

    .nav-button,
    .button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      cursor: pointer;
      transition: transform 140ms ease, opacity 140ms ease;
    }

    .nav-button:hover,
    .button:hover {
      transform: translateY(-1px);
    }

    .nav-button {
      background: rgba(29, 24, 18, 0.08);
      color: var(--ink);
      font-weight: 700;
      pointer-events: auto;
    }

    .nav-button.is-active,
    .button-primary {
      background: var(--accent);
      color: #fff;
    }

    .button-secondary {
      background: rgba(29, 24, 18, 0.08);
      color: var(--ink);
    }

    .view {
      display: none;
    }

    .view.is-active {
      display: grid;
      gap: 18px;
    }

    .panel {
      padding: 22px;
    }

    .section-head,
    .sub-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .section-note {
      max-width: 420px;
      color: var(--muted);
      line-height: 1.7;
      text-align: right;
    }

    .stack {
      display: grid;
      gap: 16px;
    }

    .grid-two {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .grid-three {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field span {
      font-size: 0.92rem;
      font-weight: 700;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.78);
      color: var(--ink);
      padding: 12px 14px;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: 2px solid rgba(201, 100, 41, 0.25);
      border-color: rgba(201, 100, 41, 0.36);
    }

    .split-layout {
      display: grid;
      grid-template-columns: 380px minmax(0, 1fr);
      gap: 18px;
    }

    .card,
    .menu-card,
    .recipe-card,
    .metric-card,
    .check-card,
    .sheet-card {
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.74);
    }

    .card,
    .menu-card,
    .sheet-card {
      padding: 18px;
    }

    .recipe-card {
      padding: 16px;
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
    }

    .recipe-card:hover {
      transform: translateY(-1px);
    }

    .recipe-card.is-active {
      border-color: rgba(201, 100, 41, 0.36);
      box-shadow: inset 0 0 0 1px rgba(201, 100, 41, 0.18);
    }

    .recipe-list,
    .food-list,
    .ingredient-list,
    .history-list {
      display: grid;
      gap: 12px;
    }

    .food-list {
      max-height: 360px;
      overflow: auto;
      padding-right: 4px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(300px, 0.8fr);
      gap: 16px;
      align-items: start;
    }

    .recipe-detail {
      padding: 20px;
    }

    .recipe-detail h3 {
      margin-bottom: 8px;
      font-size: 1.6rem;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .detail-block + .detail-block {
      margin-top: 18px;
    }

    .detail-block h4 {
      margin-bottom: 10px;
    }

    .detail-list {
      margin: 0;
      padding-left: 20px;
      line-height: 1.8;
    }

    .pill,
    .tag {
      display: inline-flex;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 0.8rem;
    }

    .pill {
      background: var(--accent-soft);
      color: var(--accent-deep);
    }

    .pill-muted {
      background: rgba(29, 24, 18, 0.06);
      color: var(--muted);
    }

    .tag {
      background: var(--warning-soft);
      color: var(--warning);
    }

    .metrics-grid {
      display: grid;
      gap: 12px;
    }

    .metrics-grid.six {
      grid-template-columns: repeat(6, minmax(0, 1fr));
    }

    .metric-card {
      padding: 16px;
      background: var(--surface-strong);
    }

    .metric-card strong {
      display: block;
      margin-top: 10px;
      font-size: 1.3rem;
    }

    .metric-card small {
      display: block;
      margin-top: 8px;
      color: var(--muted);
    }

    .recipe-detail .metrics-grid.six {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .weekly-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    .resident-menu-table,
    .kitchen-summary-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .resident-menu-table th,
    .resident-menu-table td,
    .kitchen-summary-table th,
    .kitchen-summary-table td {
      border: 1px solid rgba(56, 43, 28, 0.14);
      padding: 10px 12px;
      vertical-align: top;
      text-align: left;
    }

    .resident-menu-table th,
    .kitchen-summary-table th {
      background: rgba(201, 100, 41, 0.08);
      font-weight: 700;
    }

    .resident-menu-table {
      font-size: 1.08rem;
    }

    .resident-menu-table tbody th {
      width: 132px;
      background: rgba(29, 24, 18, 0.04);
    }

    .resident-page-note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .kitchen-day-sheet {
      display: grid;
      gap: 14px;
    }

    .kitchen-day-meta {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 12px;
      align-items: start;
    }

    .kitchen-day-meta .metrics-grid.six {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .kitchen-recipes-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .kitchen-summary-table td:first-child,
    .kitchen-summary-table th:first-child {
      width: 112px;
    }

    .page-print-break {
      break-after: page;
      page-break-after: always;
    }

    .day-board {
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.76);
      padding: 18px;
      min-height: 100%;
    }

    .day-board.large-text {
      font-size: 1.12rem;
      line-height: 1.8;
    }

    .day-board h3 {
      margin-bottom: 10px;
      font-size: 1.4rem;
    }

    .resident-meal-list,
    .saved-menu-list,
    .kitchen-step-list {
      margin: 0;
      padding-left: 20px;
      line-height: 1.8;
    }

    .check-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .check-card {
      padding: 16px;
    }

    .check-card.pass {
      background: rgba(245, 255, 251, 0.84);
      border-color: rgba(31, 139, 98, 0.34);
    }

    .check-card.fail {
      background: rgba(255, 246, 246, 0.84);
      border-color: rgba(179, 63, 63, 0.34);
    }

    .check-card strong {
      display: block;
      margin-top: 8px;
      font-size: 1.05rem;
    }

    .print-note {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .kitchen-week-grid {
      display: grid;
      gap: 14px;
    }

    .sheet-card h3 {
      margin-bottom: 10px;
    }

    .ingredient-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    .ingredient-table th,
    .ingredient-table td {
      border-bottom: 1px solid rgba(56, 43, 28, 0.1);
      padding: 8px;
      text-align: left;
      vertical-align: top;
      font-size: 0.94rem;
    }

    .ingredient-table th {
      color: var(--muted);
      font-weight: 700;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .empty-state {
      padding: 22px;
      border-radius: var(--radius-lg);
      text-align: center;
      color: var(--muted);
      border: 1px dashed rgba(29, 24, 18, 0.18);
      background: rgba(255, 255, 255, 0.48);
    }

    @media (max-width: 1120px) {
      .hero,
      .split-layout,
      .detail-grid,
      .weekly-grid,
      .kitchen-day-meta,
      .kitchen-recipes-grid,
      .check-grid,
      .metrics-grid.six,
      .grid-three {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .app-shell {
        width: min(100% - 12px, 1380px);
      }

      .hero,
      .panel {
        padding: 18px;
      }

      .hero-main {
        max-width: none;
        padding-right: 0;
      }

      .hero-title {
        font-size: clamp(1.65rem, 7vw, 2.1rem);
      }

      .hero-copy {
        max-width: none;
      }

      .hero-sprig {
        width: 54px;
        right: 10px;
        bottom: 8px;
      }

      .grid-two {
        grid-template-columns: 1fr;
      }

      .section-head,
      .sub-head {
        flex-direction: column;
        align-items: stretch;
      }

      .section-note {
        text-align: left;
        max-width: none;
      }

      .page-nav,
      .toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      .button,
      .nav-button {
        width: 100%;
      }
    }

    @media print {
      @page {
        size: A4 portrait;
        margin: 10mm;
      }

      html,
      body {
        width: 210mm;
      }

      body {
        background: #fff;
        color: #111;
        font-size: 10.5pt;
      }

      .hero,
      .page-nav,
      .admin-only,
      .no-print {
        display: none !important;
      }

      .view {
        display: none !important;
      }

      .view.is-print-target {
        display: grid !important;
      }

      .panel,
      .day-board,
      .sheet-card,
      .card {
        box-shadow: none;
        border: 1px solid #bbb;
        background: #fff;
      }

      .app-shell {
        width: 100%;
        padding: 0;
      }

      #resident-view {
        gap: 0;
      }

      #resident-view .panel {
        border: 0;
        padding: 0;
      }

      .resident-menu-table {
        font-size: 13pt;
      }

      .resident-menu-table th,
      .resident-menu-table td {
        padding: 8px 9px;
      }

      .resident-page-note {
        margin-top: 6px;
        font-size: 9pt;
      }

      #kitchen-view {
        gap: 0;
      }

      .kitchen-intro {
        display: none !important;
      }

      .kitchen-day-sheet {
        min-height: 276mm;
        align-content: start;
      }

      .kitchen-day-sheet.panel {
        padding: 8mm 7mm;
        border: 0;
      }

      .page-print-break {
        break-after: page;
        page-break-after: always;
      }

      #kitchen-view > .page-print-break:last-child {
        break-after: auto;
        page-break-after: auto;
      }

      .kitchen-day-meta,
      .kitchen-recipes-grid,
      .check-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .kitchen-summary-table,
      .ingredient-table {
        font-size: 9pt;
      }

      .kitchen-summary-table th,
      .kitchen-summary-table td,
      .ingredient-table th,
      .ingredient-table td {
        padding: 5px 6px;
      }

      .sheet-card,
      .check-card,
      .metric-card {
        break-inside: avoid;
        page-break-inside: avoid;
      }

      .sheet-card {
        padding: 10px;
      }

      .sheet-card h3,
      .kitchen-day-sheet h2 {
        margin-bottom: 6px;
      }

      .kitchen-step-list,
      .detail-list,
      .resident-meal-list {
        line-height: 1.45;
      }

      .metric-card strong {
        font-size: 1.05rem;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="hero-main">
        <p class="eyebrow">MOGU SUPPORT PLANNER</p>
        <h1 class="hero-title">もぐサポ君</h1>
        <p class="hero-copy">
          もぐもぐ食べる毎日の昼食を、やさしくサポートするアプリです。
          利用者向けの献立表や、調理室向けの指示書を見やすくまとめて、
          毎週の昼食づくりに役立てます。
        </p>
      </div>
      <div class="hero-sprig" aria-hidden="true">
        <svg viewBox="0 0 128 92" role="img">
          <g fill="none" fill-rule="evenodd">
            <path d="M16 74c15-21 30-38 46-50 15-12 31-19 49-23" stroke="#9bbd98" stroke-width="3.2" stroke-linecap="round"></path>
            <path d="M44 54c-8-11-8-23 0-33 12 4 18 14 17 28-4 4-9 6-17 5z" fill="#d9e9ce"></path>
            <path d="M69 41c-7-10-7-20 0-29 10 3 16 11 16 24-4 4-9 6-16 5z" fill="#c8dfbf"></path>
            <path d="M92 27c-6-8-6-17 0-25 9 3 13 10 13 20-3 3-7 5-13 5z" fill="#b6d2af"></path>
            <g transform="translate(8 54)">
              <circle cx="16" cy="16" r="5" fill="#f0c0cb"></circle>
              <ellipse cx="16" cy="7.5" rx="6.4" ry="8.2" fill="#f8d9e1"></ellipse>
              <ellipse cx="24.5" cy="16" rx="8.2" ry="6.4" fill="#f8d9e1"></ellipse>
              <ellipse cx="16" cy="24.5" rx="6.4" ry="8.2" fill="#f8d9e1"></ellipse>
              <ellipse cx="7.5" cy="16" rx="8.2" ry="6.4" fill="#f8d9e1"></ellipse>
              <circle cx="16" cy="16" r="2.8" fill="#efb15f"></circle>
            </g>
            <g transform="translate(92 48) scale(.82)">
              <circle cx="16" cy="16" r="5" fill="#f0c0cb"></circle>
              <ellipse cx="16" cy="7.5" rx="6.4" ry="8.2" fill="#f8d9e1"></ellipse>
              <ellipse cx="24.5" cy="16" rx="8.2" ry="6.4" fill="#f8d9e1"></ellipse>
              <ellipse cx="16" cy="24.5" rx="6.4" ry="8.2" fill="#f8d9e1"></ellipse>
              <ellipse cx="7.5" cy="16" rx="8.2" ry="6.4" fill="#f8d9e1"></ellipse>
              <circle cx="16" cy="16" r="2.8" fill="#efb15f"></circle>
            </g>
          </g>
        </svg>
      </div>
    </header>

    <nav class="page-nav no-print" aria-label="画面の切り替え">
      <button type="button" class="nav-button is-active" data-view="resident-view">利用者向け献立表</button>
      <button type="button" class="nav-button" data-view="kitchen-view">調理士向け指示書</button>
      <button type="button" class="nav-button admin-only" data-view="admin-view">管理画面</button>
      <button type="button" class="nav-button no-print" id="print-resident-button">利用者向けを印刷</button>
      <button type="button" class="nav-button no-print" id="print-kitchen-button">調理士向けを印刷</button>
    </nav>

    <section id="resident-view" class="view is-active is-print-target"></section>
    <section id="kitchen-view" class="view"></section>
    <section id="admin-view" class="view admin-only"></section>
  </div>

  <script>
    const STORAGE_KEYS = {
      customFoods: "nutrition-kun::custom-foods",
      customRecipes: "nutrition-kun::custom-recipes",
      weeklyMenus: "nutrition-kun::weekly-menus",
      goals: "nutrition-kun::goals",
      settings: "nutrition-kun::settings",
    };

    const WEEKDAY_KEYS = ["mon", "tue", "wed", "thu", "fri"];
    const WEEKDAY_LABELS = {
      mon: "月",
      tue: "火",
      wed: "水",
      thu: "木",
      fri: "金",
    };
    const CATEGORY_OPTIONS = ["主食", "汁物", "主菜", "副菜", "デザート", "単品料理"];
    const BASIC_SLOTS = ["主食", "汁物", "主菜", "副菜1", "副菜2", "デザート"];
    const EXCEPTION_SLOTS = ["単品料理", "追加汁物", "追加副菜", "追加デザート"];
    const NUTRIENT_META = [
      { key: "energy", label: "エネルギー", unit: "kcal", digits: 0 },
      { key: "protein", label: "たんぱく質", unit: "g", digits: 1 },
      { key: "fat", label: "脂質", unit: "g", digits: 1 },
      { key: "carbs", label: "炭水化物", unit: "g", digits: 1 },
      { key: "salt", label: "塩分", unit: "g", digits: 1 },
      { key: "fiber", label: "食物繊維", unit: "g", digits: 1 },
    ];
    const DEFAULT_GOALS = {
      energy: 550,
      protein: 22,
      fat: 18,
      carbs: 75,
      salt: 3.0,
      fiber: 6,
    };
    const DEFAULT_SETTINGS = {
      weekStart: mondayString(new Date()),
      kitchenServings: 25,
    };
    const SEASONING_FOOD_IDS = new Set(["miso", "broth", "soy_sauce", "mirin", "sugar", "curry_roux", "tomato_sauce"]);

    const DEFAULT_FOODS = [

    ];

    const state = {
      customFoods: loadStorage(STORAGE_KEYS.customFoods, []),
      customRecipes: loadStorage(STORAGE_KEYS.customRecipes, []),
      weeklyMenus: loadStorage(STORAGE_KEYS.weeklyMenus, {}),
      goals: { ...DEFAULT_GOALS, ...loadStorage(STORAGE_KEYS.goals, {}) },
      settings: { ...DEFAULT_SETTINGS, ...loadStorage(STORAGE_KEYS.settings, {}) },
      selectedView: "resident-view",
      selectedRecipeId: null,
      ingredientDrafts: [],
      printTarget: "resident-view",
    };
    globalThis.state = state;

    const elements = {
      heroWeekLabel: document.querySelector("#hero-week-label"),
      heroEnergy: document.querySelector("#hero-energy"),
      residentView: document.querySelector("#resident-view"),
      kitchenView: document.querySelector("#kitchen-view"),
      adminView: document.querySelector("#admin-view"),
      navButtons: Array.from(document.querySelectorAll(".nav-button[data-view]")),
      printResidentButton: document.querySelector("#print-resident-button"),
      printKitchenButton: document.querySelector("#print-kitchen-button"),
    };
    globalThis.elements = elements;

    init();

    function init() {
      syncSelectedRecipe();
      bindEvents();
      renderAll();
    }

    function bindEvents() {
      elements.navButtons.forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedView = button.dataset.view;
          renderViews();
        });
      });

    }

    function renderAll() {
      if (elements.heroWeekLabel) {
        elements.heroWeekLabel.textContent = `蟇ｾ雎｡騾ｱ ${formatWeekLabel(state.settings.weekStart)}`;
      }
      updateHeroSummary();
      renderViews();
      renderResidentView();
      renderKitchenView();
      renderAdminView();
    }

    function renderViews() {
      [elements.residentView, elements.kitchenView, elements.adminView].forEach((view) => {
        view.classList.toggle("is-active", view.id === state.selectedView);
        view.classList.toggle("is-print-target", view.id === state.printTarget);
      });

      elements.navButtons.forEach((button) => {
        button.classList.toggle("is-active", button.dataset.view === state.selectedView);
      });
    }

    function updateHeroSummary() {
      const weekMenus = getWeekMenus(state.settings.weekStart);
      const firstMenu = weekMenus[WEEKDAY_KEYS[0]];
      const totals = evaluateDayMenu(firstMenu).totals;
      if (elements.heroEnergy) {
        elements.heroEnergy.textContent = `${formatNumber(totals.energy, 0)} kcal`;
      }
    }

    function getAllFoods() {
      return [...DEFAULT_FOODS, ...state.customFoods];
    }

    function getAllRecipes() {
      return [...DEFAULT_RECIPES, ...state.customRecipes];
    }

    function getFoodMap() {
      return new Map(getAllFoods().map((food) => [food.id, food]));
    }

    function getRecipeMap() {
      return new Map(getAllRecipes().map((recipe) => [recipe.id, recipe]));
    }

    function isSeasoningIngredient(ingredient) {
      if (ingredient.label) {
        return ingredient.kind === "seasoning";
      }
      return SEASONING_FOOD_IDS.has(ingredient.foodId);
    }

    function renderIngredientRows(recipe, servings = state.settings.kitchenServings) {
      const foodMap = getFoodMap();
      return recipe.ingredients.map((ingredient) => {
        const food = ingredient.foodId ? foodMap.get(ingredient.foodId) : null;
        const label = food ? food.name : ingredient.label;
        const totalGrams = ingredient.grams * servings / recipe.servings;
        const kind = isSeasoningIngredient(ingredient) ? "調味料" : "材料";
        return `
          <tr>
            <td>${escapeHtml(kind)}</td>
            <td>${escapeHtml(label ?? "未設定")}</td>
            <td>${formatNumber(ingredient.grams, 0)} g</td>
            <td>${formatNumber(totalGrams, 0)} g</td>
          </tr>
        `;
      }).join("");
    }

    function renderIngredientTable(recipe, servings = state.settings.kitchenServings) {
      return `
        <table class="ingredient-table">
          <thead>
            <tr>
              <th>区分</th>
              <th>材料・調味料</th>
              <th>1人前</th>
              <th>${servings}食分</th>
            </tr>
          </thead>
          <tbody>${renderIngredientRows(recipe, servings)}</tbody>
        </table>
      `;
    }

    function syncSelectedRecipe() {
      const recipes = getAllRecipes();
      if (!state.selectedRecipeId || !recipes.find((recipe) => recipe.id === state.selectedRecipeId)) {
        state.selectedRecipeId = recipes[0]?.id ?? null;
      }
    }

    function getWeekMenus(weekStart) {
      return state.weeklyMenus[weekStart] ?? createEmptyWeekMenu(weekStart);
    }

    function createEmptyWeekMenu(weekStart) {
      const week = {};
      WEEKDAY_KEYS.forEach((dayKey, index) => {
        week[dayKey] = {
          date: addDays(weekStart, index),
          mode: "basic",
          basic: {
            staple: null,
            soup: null,
            main: null,
            side1: null,
            side2: null,
            dessert: null,
          },
          exception: {
            singleDish: null,
            extraSoup: null,
            extraSide: null,
            extraDessert: null,
          },
          memo: "",
        };
      });
      return week;
    }

    function computeRecipeNutrition(recipe) {
      const foodMap = getFoodMap();
      const total = recipe.ingredients.reduce((acc, ingredient) => {
        if (!ingredient.foodId) {
          return acc;
        }
        const food = foodMap.get(ingredient.foodId);
        if (!food) {
          return acc;
        }
        return sumNutrients(acc, scaleNutrients(food.nutrients, ingredient.grams / 100));
      }, emptyNutrients());

      return {
        total,
        perServing: scaleNutrients(total, 1 / recipe.servings),
      };
    }

    function getMenuRecipeIds(dayMenu) {
      const source = dayMenu.mode === "basic"
        ? Object.values(dayMenu.basic)
        : [dayMenu.exception.singleDish, dayMenu.exception.extraSoup, dayMenu.exception.extraSide, dayMenu.exception.extraDessert];
      return source.filter(Boolean);
    }

    function evaluateDayMenu(dayMenu) {
      const recipeMap = getRecipeMap();
      const recipes = getMenuRecipeIds(dayMenu)
        .map((recipeId) => recipeMap.get(recipeId))
        .filter(Boolean);

      const totals = recipes.reduce((acc, recipe) => (
        sumNutrients(acc, computeRecipeNutrition(recipe).perServing)
      ), emptyNutrients());

      const structurePass = dayMenu.mode === "basic"
        ? ["staple", "soup", "main", "side1", "side2", "dessert"].every((key) => Boolean(dayMenu.basic[key]))
        : Boolean(dayMenu.exception.singleDish);

      return {
        recipes,
        totals,
        structurePass,
        energyPass: totals.energy >= 500 && totals.energy <= 600,
        saltPass: totals.salt <= 3.0,
      };
    }

    function renderMetricCards(nutrients, note) {
      return `
        <div class="metrics-grid six">
          ${NUTRIENT_META.map((item) => `
            <article class="metric-card">
              <span>${item.label}</span>
              <strong>${formatNumber(nutrients[item.key], item.digits)} ${item.unit}</strong>
              <small>${note}</small>
            </article>
          `).join("")}
        </div>
      `;
    }

    function renderConditionCards(evaluation) {
      const cards = [
        {
          label: "構成",
          pass: evaluation.structurePass,
          detail: evaluation.structurePass ? "必要な構成がそろっています。" : "必要な構成が不足しています。",
        },
        {
          label: "エネルギー",
          pass: evaluation.energyPass,
          detail: `${formatNumber(evaluation.totals.energy, 0)} kcal / 逶ｮ讓・500縲・00 kcal`,
        },
        {
          label: "塩分",
          pass: evaluation.saltPass,
          detail: `${formatNumber(evaluation.totals.salt, 1)} g / 目標 3.0 g 以下`,
        },
      ];

      return cards.map((card) => `
        <article class="check-card ${card.pass ? "pass" : "fail"}">
          <span>${card.label}</span>
          <strong>${card.pass ? "適合" : "要調整"}</strong>
          <p class="muted">${card.detail}</p>
        </article>
      `).join("");
    }

    function renderAchievementRows(nutrients) {
      return NUTRIENT_META.map((item) => {
        const goal = state.goals[item.key] || 0;
        const ratio = goal > 0 ? Math.min((nutrients[item.key] / goal) * 100, 100) : 0;
        return `
          <div class="achievement-row">
            <span>${item.label}</span>
            <div class="track"><div style="width:${ratio}%"></div></div>
            <strong>${formatNumber(nutrients[item.key], item.digits)} / ${formatNumber(goal, item.digits)} ${item.unit}</strong>
          </div>
        `;
      }).join("");
    }

    function menuSlotsForDisplay(dayMenu) {
      return dayMenu.mode === "basic"
        ? [
          ["主食", dayMenu.basic.staple],
          ["汁物", dayMenu.basic.soup],
          ["主菜", dayMenu.basic.main],
          ["副菜1", dayMenu.basic.side1],
          ["副菜2", dayMenu.basic.side2],
          ["デザート", dayMenu.basic.dessert],
        ]
        : [
          ["単品料理", dayMenu.exception.singleDish],
          ["追加汁物", dayMenu.exception.extraSoup],
          ["追加副菜", dayMenu.exception.extraSide],
          ["追加デザート", dayMenu.exception.extraDessert],
        ].filter(([, value]) => value);
    }

    function sumNutrients(left, right) {
      return {
        energy: left.energy + right.energy,
        protein: left.protein + right.protein,
        fat: left.fat + right.fat,
        carbs: left.carbs + right.carbs,
        salt: left.salt + right.salt,
        fiber: left.fiber + right.fiber,
      };
    }

    function scaleNutrients(nutrients, ratio) {
      return {
        energy: nutrients.energy * ratio,
        protein: nutrients.protein * ratio,
        fat: nutrients.fat * ratio,
        carbs: nutrients.carbs * ratio,
        salt: nutrients.salt * ratio,
        fiber: nutrients.fiber * ratio,
      };
    }

    function emptyNutrients() {
      return { energy: 0, protein: 0, fat: 0, carbs: 0, salt: 0, fiber: 0 };
    }

    function loadStorage(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch {
        return fallback;
      }
    }

    function saveStorage(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function mondayString(date) {
      const copy = new Date(date);
      const day = copy.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      copy.setDate(copy.getDate() + diff);
      return `${copy.getFullYear()}-${String(copy.getMonth() + 1).padStart(2, "0")}-${String(copy.getDate()).padStart(2, "0")}`;
    }

    function addDays(dateString, days) {
      const date = new Date(dateString);
      date.setDate(date.getDate() + days);
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function formatDate(dateString) {
      return new Intl.DateTimeFormat("ja-JP", { month: "numeric", day: "numeric" }).format(new Date(dateString));
    }

    function formatWeekLabel(weekStart) {
      return `${formatDate(weekStart)} - ${formatDate(addDays(weekStart, 4))}`;
    }

    function formatNumber(value, digits) {
      return Number(value || 0).toFixed(digits);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderResidentView() {
      const weekMenus = getWeekMenus(state.settings.weekStart);
      const recipeMap = getRecipeMap();
      const residentCards = WEEKDAY_KEYS.map((dayKey) => {
        const dayMenu = weekMenus[dayKey];
        const evaluation = evaluateDayMenu(dayMenu);
        const slotItems = menuSlotsForDisplay(dayMenu)
          .map(([label, recipeId]) => {
            const recipe = recipeMap.get(recipeId);
            return `<li>${label}: ${escapeHtml(recipe?.name ?? "未設定")}</li>`;
          })
          .join("");

        return `
          <article class="day-board large-text">
            <p class="section-kicker">${WEEKDAY_LABELS[dayKey]}曜日</p>
            <h3>${formatDate(dayMenu.date)}</h3>
            <ul class="resident-meal-list">${slotItems}</ul>
            <p class="muted">エネルギー ${formatNumber(evaluation.totals.energy, 0)} kcal / 塩分 ${formatNumber(evaluation.totals.salt, 1)} g</p>
          </article>
        `;
      }).join("");

      elements.residentView.innerHTML = `
        <article class="panel">
          <div class="section-head">
            <div>
              <p class="section-kicker">Resident Menu</p>
              <h2>利用者向け 5日分献立表</h2>
            </div>

        const dayMenu = weekMenus[dayKey];
        const evaluation = evaluateDayMenu(dayMenu);
        return `
          <article class="menu-card">
            <div class="sub-head">
              <div>
                <p class="section-kicker">${WEEKDAY_LABELS[dayKey]}曜日</p>
                <h3>${formatDate(dayMenu.date)}</h3>
              </div>
              <span class="pill-muted pill">${dayMenu.mode === "basic" ? "基本献立" : "例外献立"}</span>

                ${renderSlotSelect(dayKey, "basic", "soup", "汁物", dayMenu.basic.soup, recipeOptionsByCategory("汁物"))}
                ${renderSlotSelect(dayKey, "basic", "main", "主菜", dayMenu.basic.main, recipeOptionsByCategory("主菜"))}
                ${renderSlotSelect(dayKey, "basic", "side1", "副菜1", dayMenu.basic.side1, recipeOptionsByCategory("副菜"))}
                ${renderSlotSelect(dayKey, "basic", "side2", "副菜2", dayMenu.basic.side2, recipeOptionsByCategory("副菜"))}
                ${renderSlotSelect(dayKey, "basic", "dessert", "デザート", dayMenu.basic.dessert, recipeOptionsByCategory("デザート"))}
              </div>
              <div class="grid-two">
                ${renderSlotSelect(dayKey, "exception", "singleDish", "単品料理", dayMenu.exception.singleDish, recipeOptionsByCategory("単品料理"))}

                ${renderSlotSelect(dayKey, "exception", "extraSide", "追加副菜", dayMenu.exception.extraSide, recipeOptionsByCategory("副菜"), true)}

              <input id="admin-kitchen-servings" type="number" min="1" step="1" value="${escapeHtml(state.settings.kitchenServings)}">
            </label>
            <button type="button" class="button button-primary" id="save-week-button">この週を保存</button>
          </div>
        </article>

        <article class="panel">
          <div class="section-head">
            <div>
              <p class="section-kicker">Weekly Editor</p>
              <h2>5日分献立編集</h2>
            </div>
            <p class="section-note">月曜から金曜までの献立内容を個別に編集できます。</p>
          </div>
          <div class="weekly-grid">${editorCards}</div>
        </article>

        <article class="panel">
          <div class="section-head">
            <div>
              <p class="section-kicker">Recipe Master</p>
              <h2>料理一覧</h2>

        <article class="panel">
          <div class="section-head">

        </article>

      bindAdminViewEvents();

    function renderSlotSelect(dayKey, mode, field, label, currentValue, recipes, optional = false) {
      return `
        <label class="field">
          <span>${label}</span>
          <select data-menu-day="${dayKey}" data-menu-mode="${mode}" data-menu-field="${field}">
            <option value="">${optional ? "追加しない" : "選択してください"}</option>
            ${recipes.map((recipe) => `<option value="${recipe.id}" ${recipe.id === currentValue ? "selected" : ""}>${escapeHtml(recipe.name)}</option>`).join("")}
          </select>
        </label>
      `;
    }

    function bindAdminViewEvents() {
      const weekStartInput = document.querySelector("#admin-week-start");
      const kitchenServingsInput = document.querySelector("#admin-kitchen-servings");
      const saveWeekButton = document.querySelector("#save-week-button");
      const menuInputs = Array.from(document.querySelectorAll("[data-menu-day]"));
      const recipeCards = Array.from(document.querySelectorAll("[data-recipe-card]"));

      weekStartInput?.addEventListener("change", () => {
        state.settings.weekStart = weekStartInput.value || mondayString(new Date());
        saveStorage(STORAGE_KEYS.settings, state.settings);
        renderAll();
      });

      kitchenServingsInput?.addEventListener("change", () => {
        state.settings.kitchenServings = Math.max(1, Number(kitchenServingsInput.value || 1));
        saveStorage(STORAGE_KEYS.settings, state.settings);
        renderAll();
      });

      recipeCards.forEach((card) => {
        card.addEventListener("click", () => {
          state.selectedRecipeId = card.dataset.recipeCard;
          renderAdminView();
        });
      });

      menuInputs.forEach((input) => {
        input.addEventListener("change", () => {
          const draft = collectWeekDraftFromDom();
          const previewMenu = draft[input.dataset.menuDay];
          if (previewMenu) {
            if (elements.heroEnergy) {
              elements.heroEnergy.textContent = `${formatNumber(evaluateDayMenu(previewMenu).totals.energy, 0)} kcal`;
            }
          }
        });
      });

      saveWeekButton?.addEventListener("click", () => {
        const nextWeek = collectWeekDraftFromDom();
        state.weeklyMenus[state.settings.weekStart] = nextWeek;
        saveStorage(STORAGE_KEYS.weeklyMenus, state.weeklyMenus);
        renderAll();
      });
    }

    function collectWeekDraftFromDom() {
      const draft = createEmptyWeekMenu(state.settings.weekStart);
      const inputs = Array.from(document.querySelectorAll("[data-menu-day]"));

      inputs.forEach((input) => {
        const dayKey = input.dataset.menuDay;
        const field = input.dataset.menuField;
        const mode = input.dataset.menuMode;
        if (!draft[dayKey]) {
          return;
        }
        if (field === "memo") {
          draft[dayKey].memo = input.value;
          return;
        }
        if (field === "mode") {
          draft[dayKey].mode = input.value;
          return;
        }
        if (mode === "basic") {
          draft[dayKey].basic[field] = input.value || null;
        }
        if (mode === "exception") {
          draft[dayKey].exception[field] = input.value || null;
        }
      });

      return draft;
    }
  </script>
  <script src="./enhancements.js?v=20260410-printfix1"></script>
  <script>
    (function () {
      const viewIds = ["resident-view", "kitchen-view", "admin-view"];

      function setActiveView(viewId, logLabel) {
        viewIds.forEach((id) => {
          const section = document.getElementById(id);
          if (!section) {
            return;
          }
          const isActive = id === viewId;
          section.classList.toggle("is-active", isActive);
          section.style.display = isActive ? "grid" : "none";
        });

        document.querySelectorAll(".nav-button[data-view]").forEach((button) => {
          button.classList.toggle("is-active", button.dataset.view === viewId);
        });

        console.log("[nav-fallback]", logLabel, viewId);
      }

      function bindTopButtons() {
        const residentButton = document.querySelector('.nav-button[data-view="resident-view"]');
        const kitchenButton = document.querySelector('.nav-button[data-view="kitchen-view"]');
        const adminButton = document.querySelector('.nav-button[data-view="admin-view"]');
        const residentPrintButton = document.getElementById("print-resident-button");
        const kitchenPrintButton = document.getElementById("print-kitchen-button");

        if (residentButton) {
          residentButton.onclick = function () {
            setActiveView("resident-view", "利用者向け献立表 clicked");
          };
        }
        if (kitchenButton) {
          kitchenButton.onclick = function () {
            setActiveView("kitchen-view", "調理室向け指示書 clicked");
          };
        }
        if (adminButton) {
          adminButton.onclick = function () {
            setActiveView("admin-view", "管理画面 clicked");
          };
        }
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", function () {
          bindTopButtons();
          setActiveView("resident-view", "初期表示");
        });
      } else {
        bindTopButtons();
        setActiveView("resident-view", "初期表示");
      }
    })();
  </script>
